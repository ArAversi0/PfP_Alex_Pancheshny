name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  java:
    name: Java backend and shared rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Run backend and shared rule tests
        run: |
          chmod +x ./gradlew
          ./gradlew :libs:game-rules:test :apps:backend:test --console=plain

      - name: Upload Java test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-reports
          path: |
            apps/backend/build/reports/tests/test
            apps/backend/build/reports/jacoco/test/html
            libs/game-rules/build/reports/tests/test
          if-no-files-found: ignore

  desktop-tests:
    name: Desktop tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Run desktop tests
        run: |
          chmod +x ./gradlew
          ./gradlew :apps:desktop:test --console=plain

      - name: Upload desktop test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-test-reports
          path: apps/desktop/build/reports/tests/test
          if-no-files-found: ignore

  web:
    name: Web lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build web client
        run: npm run build

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          if-no-files-found: error

  docker:
    name: Docker Compose build check
    runs-on: ubuntu-latest
    needs:
      - java
      - web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Build backend jar for Docker image
        run: |
          chmod +x ./gradlew
          ./gradlew :apps:backend:bootJar --console=plain

      - name: Build web dist for Docker image
        working-directory: apps/web
        run: |
          npm ci
          npm run build

      - name: Validate Docker Compose file
        run: docker compose -f infra/compose.yaml config --quiet

      - name: Build Docker images
        run: docker compose -f infra/compose.yaml build

  desktop-package:
    name: Desktop app image and installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build self-contained desktop app image
        shell: powershell
        run: .\gradlew.bat :apps:desktop:packageDesktopAppImage --console=plain

      - name: Upload desktop app image
        uses: actions/upload-artifact@v4
        with:
          name: pfp-desktop-app-image-windows
          path: apps/desktop/build/jpackage/image/PfP Companion
          if-no-files-found: error

      - name: Install WiX Toolset for Windows installer
        shell: powershell
        run: |
          choco install wixtoolset --no-progress -y
          $wixRoot = Get-ChildItem "${env:ProgramFiles(x86)}" -Directory -Filter "WiX Toolset*" |
            Sort-Object Name -Descending |
            Select-Object -First 1
          if ($null -eq $wixRoot) {
            throw "WiX Toolset directory was not found after installation."
          }
          $wixBin = Join-Path $wixRoot.FullName "bin"
          if (-not (Test-Path (Join-Path $wixBin "candle.exe")) -or -not (Test-Path (Join-Path $wixBin "light.exe"))) {
            throw "WiX candle.exe/light.exe were not found in $wixBin."
          }
          Add-Content $env:GITHUB_PATH $wixBin

      - name: Build Windows desktop installer
        shell: powershell
        run: .\gradlew.bat :apps:desktop:packageDesktopInstaller --console=plain

      - name: Upload Windows desktop installer
        uses: actions/upload-artifact@v4
        with:
          name: pfp-desktop-installer-windows
          path: apps/desktop/build/jpackage/installer/*
          if-no-files-found: error
