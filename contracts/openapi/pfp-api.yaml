openapi: 3.1.0
info:
  title: PfP Companion System API
  version: 1.0.0
  description: |
    REST contract for the PfP Companion System MVP.
    Character, item, spell and user identifiers exposed by this API are stable UUID values.
    Derived gameplay values are calculated by the backend and are read-only.
servers:
  - url: /api/v1
tags:
  - name: Health
  - name: Auth
  - name: Profile
  - name: Characters
  - name: Character sheet
  - name: Stats and skills
  - name: Condition
  - name: Inventory
  - name: Equipment
  - name: Money
  - name: Spells
  - name: Character transfer
  - name: Media
  - name: Lore
  - name: Rule book
paths:
  /health:
    servers:
      - url: /api
    get:
      tags: [Health]
      operationId: getHealth
      summary: Check backend availability
      security: []
      responses:
        "200":
          description: Backend is available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Create a persisted user account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Authenticate with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentication succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/verify-email:
    get:
      tags: [Auth]
      operationId: verifyEmail
      summary: Verify an email address using a single-use token
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericMessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/verify-email/resend:
    post:
      tags: [Auth]
      operationId: resendEmailVerification
      summary: Request a new email verification link
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
      responses:
        "200":
          description: Enumeration-safe resend result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericMessageResponse"
  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshAccessToken
      summary: Rotate a refresh token and issue a new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Rotated token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshedTokensResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Revoke one refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericMessageResponse"
  /auth/password/forgot:
    post:
      tags: [Auth]
      operationId: forgotPassword
      summary: Request an enumeration-safe password reset email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
      responses:
        "200":
          description: Enumeration-safe reset request result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericMessageResponse"
  /auth/password/reset:
    post:
      tags: [Auth]
      operationId: resetPassword
      summary: Replace the password using a single-use reset token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password replaced and existing refresh tokens revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericMessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/oauth2/authorize/{provider}:
    get:
      tags: [Auth]
      operationId: startOAuth2Login
      summary: Start provider-specific OAuth2 login
      security: []
      parameters:
        - $ref: "#/components/parameters/OAuthProvider"
      responses:
        "302":
          description: Redirect to the configured OAuth2 provider
        "404":
          $ref: "#/components/responses/NotFound"
  /auth/oauth2/exchange:
    post:
      tags: [Auth]
      operationId: exchangeOAuth2Code
      summary: Exchange a single-use OAuth2 callback code for an application session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OAuth2ExchangeRequest"
      responses:
        "200":
          description: Authentication succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      summary: Return current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /profile:
    get:
      tags: [Profile]
      operationId: getProfile
      summary: Return current user profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /characters:
    get:
      tags: [Characters]
      operationId: listCharacters
      summary: List character cards owned by the current user
      responses:
        "200":
          description: Character cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CharacterCardResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Characters]
      operationId: createCharacter
      summary: Create a character with initial substructures
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCharacterRequest"
      responses:
        "201":
          description: Character created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterCreatedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Character limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /characters/import:
    post:
      tags: [Character transfer]
      operationId: importCharacter
      summary: Import canonical character JSON as a new character
      description: Validates schema version, enum values and references, then recalculates derived fields.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CharacterExportDocument"
      responses:
        "201":
          description: Character imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterCreatedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
  /characters/{characterId}:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    get:
      tags: [Characters]
      operationId: getCharacterSummary
      summary: Return high-level character information
      responses:
        "200":
          description: Character summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterSummaryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Characters]
      operationId: deleteCharacter
      summary: Delete a character owned by the current user
      responses:
        "200":
          description: Character deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /characters/{characterId}/sheet:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    get:
      tags: [Character sheet]
      operationId: getCharacterSheet
      summary: Return the complete character sheet for the main UI
      responses:
        "200":
          description: Full character sheet including raw and derived values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterSheetResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /characters/{characterId}/info:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    put:
      tags: [Character sheet]
      operationId: updateCharacterInfo
      summary: Update character name and high-level information
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCharacterInfoRequest"
      responses:
        "200":
          description: Updated character information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterSummaryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /characters/{characterId}/portrait:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    put:
      tags: [Character sheet]
      operationId: updateCharacterPortrait
      summary: Update the stored portrait URL after media upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePortraitRequest"
      responses:
        "200":
          description: Updated portrait reference
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortraitResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /characters/{characterId}/additional-info:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    put:
      tags: [Character sheet]
      operationId: updateAdditionalInfo
      summary: Update narrative character text blocks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdditionalInfo"
      responses:
        "200":
          description: Updated narrative information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdditionalInfo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /characters/{characterId}/blessings:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    put:
      tags: [Character sheet]
      operationId: updateBlessings
      summary: Update manual blessings and inspirations counters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Blessings"
      responses:
        "200":
          description: Updated counters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blessings"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /characters/{characterId}/stats:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    get:
      tags: [Stats and skills]
      operationId: getStats
      summary: Return raw stat levels and derived roll representations
      responses:
        "200":
          description: Character stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Stats and skills]
      operationId: updateStats
      summary: Update raw stat levels and recalculate dependent values
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatsRequest"
      responses:
        "200":
          description: Updated stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /characters/{characterId}/skills:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    get:
      tags: [Stats and skills]
      operationId: getSkills
      summary: Return all skills and derived roll representations
      responses:
        "200":
          description: Character skills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SkillResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Stats and skills]
      operationId: updateSkills
      summary: Update raw skill levels and recalculate dependent values
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/SkillRequest"
      responses:
        "200":
          description: Updated skills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SkillResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /characters/{characterId}/condition:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    get:
      tags: [Condition]
      operationId: getCondition
      summary: Return raw condition fields and derived health values
      responses:
        "200":
          description: Character condition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConditionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Condition]
      operationId: updateCondition
      summary: Update manual and raw condition values
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConditionRequest"
      responses:
        "200":
          description: Updated condition including recalculated values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConditionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /characters/{characterId}/inventory:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    get:
      tags: [Inventory]
      operationId: getInventory
      summary: Return inventory slots and derived current weight
      responses:
        "200":
          description: Character inventory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /characters/{characterId}/inventory/rows:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    post:
      tags: [Inventory]
      operationId: addInventoryRows
      summary: Add inventory slots for one or more UI rows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddInventoryRowsRequest"
      responses:
        "200":
          description: Updated inventory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /characters/{characterId}/inventory/items:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    post:
      tags: [Inventory]
      operationId: createItem
      summary: Create an item and place it in the nearest free slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemUpsertRequest"
      responses:
        "201":
          description: Created item and placement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemPlacementResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /characters/{characterId}/inventory/items/{itemId}:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
      - $ref: "#/components/parameters/ItemId"
    get:
      tags: [Inventory]
      operationId: getItem
      summary: Return one inventory item
      responses:
        "200":
          description: Item card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Inventory]
      operationId: updateItem
      summary: Update item metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemUpsertRequest"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Inventory]
      operationId: throwAwayItem
      summary: Throw away an inventory item
      description: If the item is equipped, the backend unequips it before deletion. TRADE items are not sold by this operation.
      responses:
        "200":
          description: Item removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /characters/{characterId}/inventory/items/{itemId}/sell:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
      - $ref: "#/components/parameters/ItemId"
    post:
      tags: [Inventory]
      operationId: sellTradeItem
      summary: Sell a TRADE item and add its value to character money
      responses:
        "200":
          description: Trade item sold and removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellItemResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /characters/{characterId}/equipment:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    get:
      tags: [Equipment]
      operationId: getEquipment
      summary: Return all visible equipment slots
      responses:
        "200":
          description: Equipment state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /characters/{characterId}/equipment/equip:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    post:
      tags: [Equipment]
      operationId: equipItem
      summary: Equip an inventory item into a compatible slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EquipItemRequest"
      responses:
        "200":
          description: Updated equipment state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /characters/{characterId}/equipment/unequip:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    post:
      tags: [Equipment]
      operationId: unequipItem
      summary: Unequip an item while leaving it in inventory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnequipItemRequest"
      responses:
        "200":
          description: Updated equipment state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /characters/{characterId}/money:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    get:
      tags: [Money]
      operationId: getMoney
      summary: Return base and display money values
      responses:
        "200":
          description: Character money
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoneyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /characters/{characterId}/money/currency:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    post:
      tags: [Money]
      operationId: selectDisplayCurrency
      summary: Select display currency and recalculate display amount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelectCurrencyRequest"
      responses:
        "200":
          description: Updated display currency
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoneyResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /characters/{characterId}/spells:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    get:
      tags: [Spells]
      operationId: listSpells
      summary: List character spell cards
      responses:
        "200":
          description: Character spells
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpellResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Spells]
      operationId: createSpell
      summary: Create a spell card
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpellUpsertRequest"
      responses:
        "201":
          description: Created spell
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpellResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /characters/{characterId}/spells/{spellId}:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
