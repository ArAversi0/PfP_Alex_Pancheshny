components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    OAuthProvider:
      name: provider
      in: path
      required: true
      schema:
        type: string
        const: google
    CharacterId:
      name: characterId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ItemId:
      name: itemId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SpellId:
      name: spellId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ArticleId:
      name: articleId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    CategoryId:
      name: categoryId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
  responses:
    BadRequest:
      description: Request validation or business validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication is required or failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: The authenticated user is not allowed to perform this action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Requested resource was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Request conflicts with current resource state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          const: ok
    RegisterRequest:
      type: object
      additionalProperties: false
      required: [email, password, confirmPassword]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          format: password
          minLength: 8
        confirmPassword:
          type: string
          format: password
          minLength: 8
    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    LoginResponse:
      type: object
      required: [accessToken, refreshToken, tokenType, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          const: Bearer
        user:
          $ref: "#/components/schemas/UserResponse"
    UserResponse:
      type: object
      required: [id, email, role, emailVerified]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/UserRole"
        emailVerified:
          type: boolean
    RefreshTokenRequest:
      type: object
      additionalProperties: false
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 1
    OAuth2ExchangeRequest:
      type: object
      additionalProperties: false
      required: [code]
      properties:
        code:
          type: string
          minLength: 1
    RefreshedTokensResponse:
      type: object
      additionalProperties: false
      required: [accessToken, refreshToken, tokenType]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          const: Bearer
    EmailRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email:
          type: string
          format: email
    ResetPasswordRequest:
      type: object
      additionalProperties: false
      required: [token, newPassword, confirmPassword]
      properties:
        token:
          type: string
          minLength: 1
        newPassword:
          type: string
          format: password
          minLength: 8
        confirmPassword:
          type: string
          format: password
          minLength: 8
    GenericMessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
    UserRole:
      type: string
      enum: [ROLE_USER, ROLE_ADMIN]
    CreateCharacterRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
    CharacterCreatedResponse:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    CharacterCardResponse:
      type: object
      required: [id, name, level, className, specialization, imageUrl]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        level:
          type: integer
          minimum: 1
        className:
          type: string
        specialization:
          type: string
        imageUrl:
          type: string
    CharacterSummaryResponse:
      type: object
      required: [id, name, imageUrl, info]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        imageUrl:
          type: string
        info:
          $ref: "#/components/schemas/CharacterInfo"
    CharacterInfo:
      type: object
      additionalProperties: false
      required: [level, origin, background, className, specialization]
      properties:
        level:
          type: integer
          minimum: 1
        origin:
          type: string
        background:
          type: string
        className:
          type: string
        specialization:
          type: string
    UpdateCharacterInfoRequest:
      type: object
      additionalProperties: false
      required: [name, level, origin, background, className, specialization]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        level:
          type: integer
          minimum: 1
        origin:
          type: string
          maxLength: 120
        background:
          type: string
          maxLength: 120
        className:
          type: string
          maxLength: 120
        specialization:
          type: string
          maxLength: 120
    UpdatePortraitRequest:
      type: object
      additionalProperties: false
      required: [imageUrl]
      properties:
        imageUrl:
          type: string
          maxLength: 500
    PortraitResponse:
      type: object
      required: [characterId, imageUrl]
      properties:
        characterId:
          type: string
          format: uuid
        imageUrl:
          type: string
    Blessings:
      type: object
      additionalProperties: false
      required: [blessings, inspirations]
      properties:
        blessings:
          $ref: "#/components/schemas/NonNegativeInteger"
        inspirations:
          $ref: "#/components/schemas/NonNegativeInteger"
    AdditionalInfo:
      type: object
      additionalProperties: false
      required: [appearance, detailedOrigin, allies, notesPrimary, notesSecondary]
      properties:
        appearance:
          type: string
        detailedOrigin:
          type: string
        allies:
          type: string
        notesPrimary:
          type: string
        notesSecondary:
          type: string
    StatsRequest:
      type: object
      additionalProperties: false
      required: [strength, dexterity, stamina, intelligence, charisma, luck, mind]
      properties:
        strength:
          $ref: "#/components/schemas/NonNegativeInteger"
        dexterity:
          $ref: "#/components/schemas/NonNegativeInteger"
        stamina:
          $ref: "#/components/schemas/NonNegativeInteger"
        intelligence:
          $ref: "#/components/schemas/NonNegativeInteger"
        charisma:
          $ref: "#/components/schemas/NonNegativeInteger"
        luck:
          $ref: "#/components/schemas/NonNegativeInteger"
        mind:
          $ref: "#/components/schemas/NonNegativeInteger"
    StatsResponse:
      type: object
      additionalProperties: false
      required: [strength, dexterity, stamina, intelligence, charisma, luck, mind]
      properties:
        strength:
          $ref: "#/components/schemas/StatResponse"
        dexterity:
          $ref: "#/components/schemas/StatResponse"
        stamina:
          $ref: "#/components/schemas/StatResponse"
        intelligence:
          $ref: "#/components/schemas/StatResponse"
        charisma:
          $ref: "#/components/schemas/StatResponse"
        luck:
          $ref: "#/components/schemas/StatResponse"
        mind:
          $ref: "#/components/schemas/StatResponse"
    StatResponse:
      type: object
      required: [level, roll]
      properties:
        level:
          $ref: "#/components/schemas/NonNegativeInteger"
        roll:
          type: string
          readOnly: true
    SkillRequest:
      type: object
      additionalProperties: false
      required: [statGroup, skillName, level]
      properties:
        statGroup:
          $ref: "#/components/schemas/StatGroup"
        skillName:
          $ref: "#/components/schemas/SkillName"
        level:
          $ref: "#/components/schemas/NonNegativeInteger"
    SkillResponse:
      allOf:
        - $ref: "#/components/schemas/SkillRequest"
        - type: object
          required: [skillRoll, effectiveRoll]
          properties:
            skillRoll:
              type: string
              readOnly: true
            effectiveRoll:
              type: string
              readOnly: true
    ConditionRequest:
      type: object
      additionalProperties: false
      required: [passiveDefense, movementSpeed, maxCarryWeight, hp]
      properties:
        passiveDefense:
          $ref: "#/components/schemas/NonNegativeInteger"
        movementSpeed:
          $ref: "#/components/schemas/NonNegativeNumber"
        maxCarryWeight:
          $ref: "#/components/schemas/NonNegativeNumber"
        hp:
          $ref: "#/components/schemas/BodyHealth"
    ConditionResponse:
      allOf:
        - $ref: "#/components/schemas/ConditionRequest"
        - type: object
          required: [globalHealthPercent, passiveDodge, currentCarryWeight, overweight]
          properties:
            globalHealthPercent:
              type: number
              minimum: 0
              maximum: 100
              readOnly: true
            passiveDodge:
              $ref: "#/components/schemas/NonNegativeInteger"
              readOnly: true
            currentCarryWeight:
              $ref: "#/components/schemas/NonNegativeNumber"
              readOnly: true
            overweight:
              type: boolean
              readOnly: true
    BodyHealth:
      type: object
      additionalProperties: false
      required: [head, neck, torso, leftArm, rightArm, leftLeg, rightLeg]
      properties:
        head:
          $ref: "#/components/schemas/BodyPartHealth"
        neck:
          $ref: "#/components/schemas/BodyPartHealth"
        torso:
          $ref: "#/components/schemas/BodyPartHealth"
        leftArm:
          $ref: "#/components/schemas/BodyPartHealth"
        rightArm:
          $ref: "#/components/schemas/BodyPartHealth"
        leftLeg:
          $ref: "#/components/schemas/BodyPartHealth"
        rightLeg:
          $ref: "#/components/schemas/BodyPartHealth"
    BodyPartHealth:
      type: object
      additionalProperties: false
      required: [max, current]
      properties:
        max:
          $ref: "#/components/schemas/NonNegativeInteger"
        current:
          $ref: "#/components/schemas/NonNegativeInteger"
    InventoryResponse:
      type: object
      required: [maxCarryWeight, currentCarryWeight, overweight, slots]
      properties:
        maxCarryWeight:
          $ref: "#/components/schemas/NonNegativeNumber"
        currentCarryWeight:
          $ref: "#/components/schemas/NonNegativeNumber"
          readOnly: true
        overweight:
          type: boolean
          readOnly: true
        slots:
          type: array
          items:
            $ref: "#/components/schemas/InventorySlotResponse"
    InventorySlotResponse:
      type: object
      required: [slotIndex]
      properties:
        slotIndex:
          $ref: "#/components/schemas/NonNegativeInteger"
        item:
          oneOf:
            - $ref: "#/components/schemas/ItemResponse"
            - type: "null"
    AddInventoryRowsRequest:
      type: object
      additionalProperties: false
      required: [rowsToAdd]
      properties:
        rowsToAdd:
          type: integer
          minimum: 1
    ItemUpsertRequest:
      type: object
      additionalProperties: false
      required: [type, title, imageUrl, weight]
      properties:
        type:
          $ref: "#/components/schemas/ItemType"
        title:
          type: string
          minLength: 1
          maxLength: 150
        imageUrl:
          type: string
          maxLength: 500
          description: "Optional image URL. Use an empty string when no image is set."
        weight:
          $ref: "#/components/schemas/NonNegativeNumber"
        description:
          type: string
          default: ""
        equipmentType:
          $ref: "#/components/schemas/EquipmentType"
        sellPriceBase:
          $ref: "#/components/schemas/NonNegativeMoney"
    ItemResponse:
      allOf:
        - type: object
          required: [id]
          properties:
            id:
              type: string
              format: uuid
        - $ref: "#/components/schemas/ItemUpsertRequest"
    ItemPlacementResponse:
      type: object
      required: [slotIndex, item]
      properties:
        slotIndex:
          $ref: "#/components/schemas/NonNegativeInteger"
        item:
          $ref: "#/components/schemas/ItemResponse"
    SellItemResponse:
      type: object
      required: [deleted, money]
      properties:
        deleted:
          type: boolean
          const: true
        money:
          $ref: "#/components/schemas/MoneyResponse"
    EquipmentResponse:
      type: object
      additionalProperties: false
      required: [HEAD, NECK, TORSO, ARMS, LEGS, WEAPON_1, WEAPON_2, TALISMAN_1, TALISMAN_2, TALISMAN_3, TALISMAN_4]
      properties:
        HEAD:
          $ref: "#/components/schemas/NullableEquippedItem"
        NECK:
          $ref: "#/components/schemas/NullableEquippedItem"
        TORSO:
          $ref: "#/components/schemas/NullableEquippedItem"
        ARMS:
          $ref: "#/components/schemas/NullableEquippedItem"
        LEGS:
          $ref: "#/components/schemas/NullableEquippedItem"
        WEAPON_1:
          $ref: "#/components/schemas/NullableEquippedItem"
        WEAPON_2:
          $ref: "#/components/schemas/NullableEquippedItem"
        TALISMAN_1:
          $ref: "#/components/schemas/NullableEquippedItem"
        TALISMAN_2:
          $ref: "#/components/schemas/NullableEquippedItem"
        TALISMAN_3:
          $ref: "#/components/schemas/NullableEquippedItem"
        TALISMAN_4:
          $ref: "#/components/schemas/NullableEquippedItem"
    NullableEquippedItem:
      oneOf:
        - $ref: "#/components/schemas/EquippedItem"
        - type: "null"
    EquippedItem:
      type: object
      required: [itemId, title, imageUrl]
      properties:
        itemId:
          type: string
          format: uuid
        title:
          type: string
        imageUrl:
          type: string
    EquipItemRequest:
      type: object
      additionalProperties: false
      required: [itemId, slotCode]
      properties:
        itemId:
          type: string
          format: uuid
        slotCode:
          $ref: "#/components/schemas/EquipmentSlotCode"
    UnequipItemRequest:
      type: object
      additionalProperties: false
      required: [slotCode]
      properties:
        slotCode:
          $ref: "#/components/schemas/EquipmentSlotCode"
    MoneyResponse:
      type: object
      required: [amountBase, displayAmount, displayCurrency]
      properties:
        amountBase:
          $ref: "#/components/schemas/NonNegativeMoney"
        displayAmount:
          $ref: "#/components/schemas/NonNegativeNumber"
          readOnly: true
        displayCurrency:
          $ref: "#/components/schemas/Currency"
    SelectCurrencyRequest:
      type: object
      additionalProperties: false
      required: [displayCurrency]
      properties:
        displayCurrency:
          $ref: "#/components/schemas/Currency"
    SpellUpsertRequest:
      type: object
      additionalProperties: false
      required: [name, type, spellClass, imageUrl, requirements]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 150
        type:
          $ref: "#/components/schemas/SpellType"
        spellClass:
          $ref: "#/components/schemas/SpellClass"
        imageUrl:
          type: string
          maxLength: 500
          description: "Optional image URL. Use an empty string when no image is set."
        requirements:
          type: string
          minLength: 1
        description:
          type: string
          default: ""
    SpellResponse:
      allOf:
        - type: object
          required: [id]
          properties:
            id:
              type: string
              format: uuid
        - $ref: "#/components/schemas/SpellUpsertRequest"
    CharacterSheetResponse:
      type: object
      required: [id, name, imageUrl, info, stats, skills, condition, blessings, additionalInfo, inventory, equipment, money, spells]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        imageUrl:
          type: string
        info:
          $ref: "#/components/schemas/CharacterInfo"
        stats:
          $ref: "#/components/schemas/StatsResponse"
        skills:
          type: array
          items:
            $ref: "#/components/schemas/SkillResponse"
        condition:
          $ref: "#/components/schemas/ConditionResponse"
        blessings:
          $ref: "#/components/schemas/Blessings"
        additionalInfo:
          $ref: "#/components/schemas/AdditionalInfo"
        inventory:
          $ref: "#/components/schemas/InventoryResponse"
        equipment:
          $ref: "#/components/schemas/EquipmentResponse"
        money:
          $ref: "#/components/schemas/MoneyResponse"
        spells:
          type: array
          items:
            $ref: "#/components/schemas/SpellResponse"
    MediaUploadResponse:
      type: object
      required: [fileName, url, contentType, size]
      properties:
        fileName:
          type: string
        url:
          type: string
        contentType:
          type: string
          enum: [image/jpeg, image/png, image/webp]
        size:
          type: integer
          format: int64
          minimum: 1
          maximum: 2097152
    LoreArticleUpsertRequest:
      type: object
      additionalProperties: false
      required: [title, content]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
          minLength: 1
        imageUrl:
          type: ["string", "null"]
          maxLength: 500
    LoreArticleResponse:
      allOf:
        - type: object
          required: [id, updatedAt]
          properties:
            id:
              type: integer
              format: int64
              minimum: 1
            updatedAt:
              type: string
              format: date-time
        - $ref: "#/components/schemas/LoreArticleUpsertRequest"
    RuleCategoryUpsertRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          default: ""
    RuleCategoryResponse:
      allOf:
        - type: object
          required: [id]
          properties:
            id:
              type: integer
              format: int64
              minimum: 1
        - $ref: "#/components/schemas/RuleCategoryUpsertRequest"
    RuleCategoryDetailsResponse:
      allOf:
        - $ref: "#/components/schemas/RuleCategoryResponse"
        - type: object
          required: [articles]
          properties:
            articles:
              type: array
              items:
                $ref: "#/components/schemas/RuleArticleResponse"
    RuleArticleUpsertRequest:
      type: object
      additionalProperties: false
      required: [categoryId, title, content]
      properties:
        categoryId:
          type: integer
          format: int64
          minimum: 1
        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
          minLength: 1
    RuleArticleResponse:
      allOf:
        - type: object
          required: [id]
          properties:
            id:
              type: integer
              format: int64
              minimum: 1
        - $ref: "#/components/schemas/RuleArticleUpsertRequest"
    DeletedResponse:
      type: object
      required: [deleted]
      properties:
        deleted:
          type: boolean
          const: true
    ErrorResponse:
      type: object
      required: [timestamp, status, error, message, path]
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string
        fieldErrors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
    FieldError:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
        message:
          type: string
    ItemType:
      type: string
      enum: [ITEM, EQUIPMENT, TRADE]
    EquipmentType:
      type: string
      enum: [HEAD, NECK, TORSO, ARMS, LEGS, WEAPON, TALISMAN]
    EquipmentSlotCode:
      type: string
      enum: [HEAD, NECK, TORSO, ARMS, LEGS, WEAPON_1, WEAPON_2, TALISMAN_1, TALISMAN_2, TALISMAN_3, TALISMAN_4]
    Currency:
      type: string
      enum: [CURRENCY_1, CURRENCY_2, CURRENCY_3, CURRENCY_4]
    SpellType:
      type: string
      enum: [SPELL, CANTRIP, RITUAL]
    SpellClass:
      type: string
      enum: [PRIEST, SPELLCASTER, WARLOCK, DRUID, ARTIST, INQUISITOR, SAVAGE]
    MediaPurpose:
      type: string
      enum: [CHARACTER, ITEM, SPELL, LORE]
    StatGroup:
      type: string
      enum: [STRENGTH, DEXTERITY, STAMINA, INTELLIGENCE, CHARISMA, LUCK, MIND]
    SkillName:
      type: string
      enum:
        - ATHLETICS
        - BLOCKING
        - GRAPPLING
        - BRUTE_FORCE
        - REFLEXES
        - EVASION
        - ACROBATICS
        - STEALTH
        - SLEIGHT_OF_HAND
        - BALANCE
        - PAIN_TOLERANCE
        - ENDURANCE
        - CARRYING_CAPACITY
        - ANALYSIS
        - MAGIC
        - RELIGION
        - SURVIVAL
        - MEDICINE
        - SCIENCE
        - AWARENESS
        - RHETORIC
        - PERFORMANCE
        - INTIMIDATION
        - CHARM
        - BUSINESS_SENSE
        - FORTUNE
        - PROFIT
        - WILLPOWER
        - COMPOSURE
        - SUGGESTION
    NonNegativeInteger:
      type: integer
      minimum: 0
    NonNegativeNumber:
      type: number
      minimum: 0
    NonNegativeMoney:
      type: number
      minimum: 0
      multipleOf: 0.01
    CharacterExportDocument:
      description: Canonical raw-state document. Must remain aligned with contracts/json-schema/character-sheet-v1.schema.json.
      type: object
      required: [schemaVersion, character]
      properties:
        schemaVersion:
          type: string
          const: "1.0"
        character:
          type: object
          description: Raw character state validated against the canonical JSON Schema.
security:
  - bearerAuth: []
